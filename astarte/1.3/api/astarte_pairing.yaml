      type: object
    AstarteMQTTV1VerifyCredentialsResponse:
      properties:
        cause:
          description: the reason the certificate is invalid
          type: string
        details:
          description: additional details on the verification
          type: string
        timestamp:
          description: the timestamp of the credentials verification
          type: integer
        until:
          description: if the certificate is valid, the timestamp after which it will be invalid
          type: integer
        valid:
          description: true if the credentials are valid, false otherwise
          type: boolean
      title: AstarteMQTTV1VerifyCredentialsResponse
      type: object
    AuthorizationPathNotMatchedResponse:
      example:
        errors:
          detail: Unauthorized access to GET /api/v1/some_path. Please verify your permissions
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      title: AuthorizationPathNotMatchedResponse
      type: object
    DeviceRegistrationRequest:
      example:
        data:
          hw_id: YHjKs3SMTgqq09eD7fzm6w
          initial_introspection:
            org.astarte-platform.genericsensors.AvailableSensors:
              major: 0
              minor: 1
            org.astarte-platform.genericsensors.Values:
              major: 1
              minor: 0
      properties:
        data:
          properties:
            hw_id:
              type: string
            initial_introspection:
              additionalProperties:
                $ref: '#/components/schemas/IntrospectionEntry'
              description: |
                An optional object specifying the initial introspection for the device. The keys
                of the object are the interface names, while the values are objects with the "major"
                and "minor" properties, specifying the major and minor version of the interface
                that is going to be supported by the device.
              type: object
          required:
            - hw_id
          type: object
      required:
        - data
      title: DeviceRegistrationRequest
      type: object
    DeviceRegistrationResponse:
      example:
        credentials_secret: TTkd5OgB13X/3qU0LXU7OCxyTXz5QHM2NY1IgidtPOs=
      properties:
        credentials_secret:
          type: string
      title: DeviceRegistrationResponse
      type: object
    ForbiddenResponse:
      description: Forbidden response
      example:
        errors:
          detail: Forbidden
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      required:
        - errors
      title: ForbiddenResponse
      type: object
    GenericErrorResponse:
      properties:
        errors:
          type: object
      title: GenericErrorResponse
      type: object
    InfoResponse:
      example:
        protocols:
          astarte_mqtt_v1:
            broker_url: ssl://broker.astarte.example.com:8883
        status: confirmed
        version: 0.1.0
      properties:
        protocols:
          type: object
        status:
          type: string
        version:
          type: string
      title: InfoResponse
      type: object
    IntrospectionEntry:
      properties:
        major:
          description: The major version of the interface
          minimum: 0
          type: integer
        minor:
          description: The minor version of the interface
          minimum: 0
          type: integer
      required:
        - major
        - minor
      title: IntrospectionEntry
      type: object
    InvalidAuthPathResponse:
      example:
        errors:
          detail: Authorization failed due to an invalid path
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      title: InvalidAuthPathResponse
      type: object
    InvalidTokenResponse:
      example:
        errors:
          detail: Invalid JWT token
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      title: InvalidTokenResponse
      type: object
    MissingTokenResponse:
      example:
        errors:
          detail: Missing authorization token
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      title: MissingTokenResponse
      type: object
    UnauthorizedResponse:
      description: Unauthorized response
      example:
        errors:
          detail: Unauthorized
      properties:
        errors:
          properties:
            detail:
              type: string
          type: object
      title: UnauthorizedResponse
      type: object
  securitySchemes:
    CredentialsSecret:
      description: |
        For accessing the device API a valid Credentials Secret must be passed in all the queries in the 'Authorization' header.
        The following syntax must be used in the 'Authorization' header : Bearer xxxxxxxxxxxxxxxxxxxxx
      in: header
      name: Authorization
      type: apiKey
    JWT:
      description: |
        For accessing the agent API a valid JWT token must be passed in all the queries in the 'Authorization' header.
        The following syntax must be used in the 'Authorization' header : Bearer xxxxxx.yyyyyyy.zzzzzz
      in: header
      name: Authorization
      type: apiKey
info:
  contact:
    email: info@ispirata.com
  description: Control device registration, authentication and authorization
  title: Astarte Pairing API
  version: 1.3.0-rc.2
openapi: 3.0.0
paths:
  /{realm_name}/agent/devices:
    post:
      description: |
        Register a device, obtaining its credentials secret. The registration
        can be repeated as long as the device didn't request any credentials.
        An optional initial introspection for the device can be passed in the
        registration request.
      operationId: registerDevice
      parameters:
        - description: Name of the realm the device belongs to.
          in: path
          name: realm_name
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegistrationRequest'
        description: Device parameters
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceRegistrationResponse'
          description: Device registered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/AuthorizationPathNotMatchedResponse'
          description: Forbidden or Authorization path not matched
        '422':
          content:
            application/json:
              example:
                errors:
                  hw_id:
                    - can't be blank
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
          description: Unprocessable entity
      security:
        - JWT: []
      summary: Register a device
      tags:
        - agent
  /{realm_name}/agent/devices/{device_id}:
    delete:
      description: Unregister a device. This makes it possible to register it again, even if it already has requested its credentials. All data belonging to the device will be kept as is.
      operationId: unregisterDevice
      parameters:
        - description: Name of the realm the device belongs to.
          in: path
          name: realm_name
          required: true
          schema:
            type: string
        - description: The Device ID of the device that will be unregistered.
          in: path
          name: device_id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Device unregistered
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/AuthorizationPathNotMatchedResponse'
          description: Forbidden or Authorization path not matched
        '404':
          content:
            application/json:
              example:
                errors:
                  detail: Device not found
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
          description: Device not found
      security:
        - JWT: []
      summary: Unregister a device
      tags:
        - agent
  /{realm_name}/devices/{hw_id}:
    get:
      operationId: getInfo
      parameters:
        - description: Name of the realm the device belongs to.
          in: path
          name: realm_name
          required: true
          schema:
            type: string
        - description: Hardware id of the device.
          in: path
          name: hw_id
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/InfoResponse'
                required:
                  - data
                type: object
          description: Info
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/AuthorizationPathNotMatchedResponse'
          description: Forbidden or Authorization path not matched
      security:
        - CredentialsSecret: []
      summary: Obtain status information for a device
      tags:
        - device
  /{realm_name}/devices/{hw_id}/protocols/{protocol}/credentials:
    post:
      operationId: obtainCredentials
      parameters:
        - description: Name of the realm the device belongs to.
          in: path
          name: realm_name
          required: true
          schema:
            type: string
        - description: Hardware id of the device.
          in: path
          name: hw_id
          required: true
          schema:
            type: string
        - description: Credentials protocol identifier.
          in: path
          name: protocol
          required: true
          schema:
            enum:
              - astarte_mqtt_v1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                data:
                  $ref: '#/components/schemas/AstarteMQTTV1CredentialsRequest'
              required:
                - data
              type: object
        description: Credentials request
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AstarteMQTTV1CredentialsResponse'
                required:
                  - data
                type: object
          description: Credentials created
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/AuthorizationPathNotMatchedResponse'
          description: Token/Realm doesn't exist or operation not allowed.
        '422':
          content:
            application/json:
              example:
                errors:
                  purpose:
                    - can't be blank
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
          description: Unprocessable entity
      security:
        - CredentialsSecret: []
      summary: Obtain the credentials for Astarte MQTT v1 protocol
      tags:
        - device
  /{realm_name}/devices/{hw_id}/protocols/{protocol}/credentials/verify:
    post:
      operationId: verifyCredentials
      parameters:
        - description: Name of the realm the device belongs to.
          in: path
          name: realm_name
          required: true
          schema:
            type: string
        - description: Hardware id of the device.
          in: path
          name: hw_id
          required: true
          schema:
            type: string
        - description: Credentials protocol identifier.
          in: path
          name: protocol
          required: true
          schema:
            enum:
              - astarte_mqtt_v1
            type: string
      requestBody:
        content:
          application/json:
            schema:
              properties:
                data:
                  $ref: '#/components/schemas/AstarteMQTTV1VerifyCredentialsRequest'
              required:
                - data
              type: object
        description: Credentials verification request
        required: true
      responses:
        '200':
          content:
            application/json:
              examples:
                response invalid certificate:
                  value:
                    data:
                      cause: INVALID_ISSUER
                      valid: false
                response valid certificate:
                  value:
                    data:
                      until: 2025-03-25 19:25:00.000Z
                      valid: true
              schema:
                properties:
                  data:
                    $ref: '#/components/schemas/AstarteMQTTV1VerifyCredentialsResponse'
                required:
                  - data
                type: object
          description: Credentials verified
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ForbiddenResponse'
                  - $ref: '#/components/schemas/AuthorizationPathNotMatchedResponse'
          description: Token/Realm doesn't exist or operation not allowed.
        '422':
          content:
            application/json:
              example:
                errors:
                  purpose:
                    - can't be blank
              schema:
                $ref: '#/components/schemas/GenericErrorResponse'
          description: Unprocessable entity
      security:
        - CredentialsSecret: []
      summary: Verify the credentials for Astarte MQTT v1 protocol
      tags:
        - device
security: []
servers:
  - url: '{base_url}/v1'
    variables:
      base_url:
        default: http://localhost:4003
        description: |
          The base URL you're serving Astarte from. This should point to the base path from which Pairing API is served.
          In case you are running a local installation, this is likely `http://localhost:4003`.
          In case you have a standard Astarte installation, it is most likely `https://<your host>/pairing`.
